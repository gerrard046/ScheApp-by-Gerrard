<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScheApp - Finance Tracker</title>
    <!-- Melampirkan Chart.js untuk grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');
        
        :root {
            --primary: #2563EB;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --success: #10B981;
            --danger: #EF4444;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); line-height: 1.6; }

        header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #60A5FA, #3B82F6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        @media(max-width: 800px) { .container { grid-template-columns: 1fr; } }

        /* Left Panel */
        .panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        
        .net-worth { background: linear-gradient(135deg, #1E3A8A, #3B82F6); padding: 30px; border-radius: 20px; margin-bottom: 30px; position:relative; overflow: hidden;}
        .net-worth h2 { font-size: 14px; opacity: 0.8; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
        .net-worth .amount { font-size: 42px; font-weight: 900; }
        
        .tab-wrap { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-weight: 800; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active-inc { background: rgba(16, 185, 129, 0.2); color: #10B981; }
        .tab-btn.active-exp { background: rgba(239, 68, 68, 0.2); color: #EF4444; }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        input, select { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; font-size:15px; font-weight: 600; font-family: inherit;}
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        select option { background: var(--card-bg); color: white; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 800; font-size:15px; cursor: pointer; transition: 0.3s; color: white; }
        .btn-inc { background: var(--success); }
        .btn-inc:hover { background: #059669; }
        .btn-exp { background: var(--danger); }
        .btn-exp:hover { background: #DC2626; }
        .btn-reset { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top:20px; }
        .btn-reset:hover { background: rgba(239,68,68,0.1); }

        /* Right Panel */
        .chart-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 30px; height: 300px; display: flex; justify-content: center; }
        
        .txn-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        .txn-header h3 { font-size: 20px; font-weight: 800; }
        
        .txn-list { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .txn-list::-webkit-scrollbar { width: 6px; }
        .txn-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .txn-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 16px; transition: 0.3s; }
        .txn-item:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .txn-left { display: flex; gap: 15px; align-items: center;}
        
        .txn-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .icon-inc { background: rgba(16, 185, 129, 0.1); }
        .icon-exp { background: rgba(239, 68, 68, 0.1); }
        
        .txn-title { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
        .txn-meta { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .txn-badge { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; font-size: 10px; text-transform: uppercase; margin-right: 5px; }
        
        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
    </style>
</head>
<body>

    <header>
        <div class="logo">SCHEAPP <span style="font-weight:400; opacity:0.6; font-size:18px;">FINANCE MURNI</span></div>
        <button class="btn btn-reset" style="width: auto; padding: 8px 16px; margin: 0; font-size: 13px;" onclick="resetWallet()">⚠️ Reset Data</button>
    </header>

    <div class="container">
        <!-- Panel Input Transaksi -->
        <div>
            <div class="net-worth">
                <h2>Total Saldo Aktif Anda</h2>
                <div class="amount" id="sim-balance">Rp 0</div>
                <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:13px; font-weight:700;">
                    <span style="color:#86EFAC;">Total Masuk: <span id="tot-inc">Rp 0</span></span>
                    <span style="color:#FCA5A5;">Total Keluar: <span id="tot-exp">Rp 0</span></span>
                </div>
            </div>

            <div class="panel">
                <h3 style="margin-bottom:20px; font-weight:800;">Catat Aliran Dana</h3>
                
                <div class="tab-wrap">
                    <button class="tab-btn active-inc" id="btn-tab-inc" onclick="switchForm('inc')">💰 Uang Masuk</button>
                    <button class="tab-btn" id="btn-tab-exp" onclick="switchForm('exp')">💸 Uang Keluar</button>
                </div>

                <!-- FORM PEMASUKAN -->
                <div id="form-inc" class="form-section active">
                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">DARI SIAPA / SUMBER DANA?</label>
                    <input type="text" id="inc-source" placeholder="Contoh: Bos A, Klien B, Orang Tua..." required>
                    
                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">NOMINAL MASUK (RP)</label>
                    <input type="number" id="inc-amount" placeholder="Contoh: 1500000" required>
                    
                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">KETERANGAN RINCI</label>
                    <input type="text" id="inc-desc" placeholder="Contoh: Gaji bulan Februari / Bayaran desain..." required>
                    
                    <button class="btn btn-inc" onclick="saveData('income')">Simpan Pemasukan</button>
                </div>

                <!-- FORM PENGELUARAN -->
                <div id="form-exp" class="form-section">
                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">KATEGORI</label>
                    <select id="exp-category">
                        <option value="Makan & Minum">🍽 Makan & Minum</option>
                        <option value="Transportasi">🚗 Transport & Bensin</option>
                        <option value="Belanja Harian">🛒 Belanja Harian</option>
                        <option value="Bayar Tagihan">🧾 Bayar Tagihan (Kos/Listrik)</option>
                        <option value="Hiburan">🎮 Hiburan & Lifestyle</option>
                        <option value="Kasih Orang Lain">🎁 Amal / Kasih Orang</option>
                        <option value="Lainnya">Lainnya...</option>
                    </select>

                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">NOMINAL KELUAR (RP)</label>
                    <input type="number" id="exp-amount" placeholder="Contoh: 50000" required>
                    
                    <label style="font-size:12px; color:var(--text-muted); font-weight:700;">KE MANA / KEPERLUAN DETAIL</label>
                    <input type="text" id="exp-desc" placeholder="Contoh: Bayar grab ke kampus / Beli Nasi Padang..." required>
                    
                    <button class="btn btn-exp" onclick="saveData('expense')">Simpan Pengeluaran</button>
                </div>
            </div>
        </div>

        <!-- Panel Riwayat & Chart -->
        <div class="panel">
            <h3 style="margin-bottom:15px; font-weight:800; text-align:center;">Distribusi Pengeluaran Anda</h3>
            <div class="chart-box">
                <canvas id="expenseChart"></canvas>
            </div>

            <!-- EXPORT IMPORT SECTION -->
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button class="btn" style="background:var(--card-bg); border:1px solid var(--border); font-size:12px; padding:10px; color:white; flex:1;" onclick="exportData()">📥 Backup Rekap Data (Ekspor)</button>
                <div style="flex:1; position:relative;">
                    <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importData(event)">
                    <button class="btn" style="background:var(--card-bg); border:1px solid var(--border); font-size:12px; padding:10px; color:white; width:100%;" onclick="document.getElementById('importFile').click()">📤 Pulihkan Data (Impor)</button>
                </div>
            </div>

            <div class="txn-header">
                <h3>Buku Catatan Keuangan</h3>
                <span id="txn-count" style="font-size:13px; color:var(--text-muted); font-weight:700;">0 Transaksi</span>
            </div>
            
            <div class="txn-list" id="txn-list">
                <!-- Javascript List -->
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('scheapp_pure_finance')) || [];
        let myChart = null;

        function switchForm(type) {
            document.getElementById('form-inc').classList.remove('active');
            document.getElementById('form-exp').classList.remove('active');
            document.getElementById('btn-tab-inc').classList.remove('active-inc');
            document.getElementById('btn-tab-exp').classList.remove('active-exp');

            if(type === 'inc') {
                document.getElementById('form-inc').classList.add('active');
                document.getElementById('btn-tab-inc').classList.add('active-inc');
            } else {
                document.getElementById('form-exp').classList.add('active');
                document.getElementById('btn-tab-exp').classList.add('active-exp');
            }
        }

        function formatRp(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function saveData(type) {
            let srcOrCat, desc, amount;

            if(type === 'income') {
                srcOrCat = document.getElementById('inc-source').value;
                desc = document.getElementById('inc-desc').value;
                amount = document.getElementById('inc-amount').value;
            } else {
                srcOrCat = document.getElementById('exp-category').value;
                desc = document.getElementById('exp-desc').value;
                amount = document.getElementById('exp-amount').value;
            }

            if(!srcOrCat || !desc || !amount) {
                alert('Tolong lengkapi semua kolom isian sebelum menyimpan!');
                return;
            }

            const newTxn = {
                id: Date.now(),
                type: type,
                entity: srcOrCat, 
                desc: desc,
                amount: parseInt(amount),
                date: new Date().toISOString()
            };

            transactions.push(newTxn);
            localStorage.setItem('scheapp_pure_finance', JSON.stringify(transactions));
            
            // Clear inputs
            document.getElementById('inc-source').value = ''; document.getElementById('inc-desc').value = ''; document.getElementById('inc-amount').value = '';
            document.getElementById('exp-desc').value = ''; document.getElementById('exp-amount').value = '';
            
            refreshUI();
        }

        function refreshUI() {
            const listEl = document.getElementById('txn-list');
            listEl.innerHTML = '';
            
            let bal = 0, totInc = 0, totExp = 0;
            let categorySums = {};

            if(transactions.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#94A3B8; padding:40px;">Buku belum ada isinya. Segera catat uang masuk atau keluar!</div>';
            }

            transactions.slice().reverse().forEach(txn => {
                const isInc = txn.type === 'income';
                if(isInc) { bal += txn.amount; totInc += txn.amount; }
                else { 
                    bal -= txn.amount; totExp += txn.amount; 
                    // Tally categories for Chart
                    categorySums[txn.entity] = (categorySums[txn.entity] || 0) + txn.amount;
                }

                const dateStr = new Date(txn.date).toLocaleString('id-ID', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                
                listEl.innerHTML += `
                    <div class="txn-item">
                        <div class="txn-left">
                            <div class="txn-icon ${isInc ? 'icon-inc text-green' : 'icon-exp text-red'}">
                                ${isInc ? '⬇️' : '⬆️'}
                            </div>
                            <div>
                                <div class="txn-title">${txn.desc}</div>
                                <div class="txn-meta">
                                    <span class="txn-badge">${isInc ? 'Dari: '+txn.entity : 'Kat: '+txn.entity}</span>
                                    ${dateStr}
                                </div>
                            </div>
                        </div>
                        <div style="font-weight:900; font-size:16px;" class="${isInc ? 'text-green' : 'text-red'}">
                            ${isInc ? '+' : '-'} ${formatRp(txn.amount)}
                        </div>
                    </div>
                `;
            });

            document.getElementById('sim-balance').innerText = formatRp(bal);
            document.getElementById('tot-inc').innerText = formatRp(totInc);
            document.getElementById('tot-exp').innerText = formatRp(totExp);
            document.getElementById('txn-count').innerText = transactions.length + " Transaksi";

            renderChart(categorySums);
        }

        function renderChart(dataObj) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            if(myChart) myChart.destroy();
            
            const labels = Object.keys(dataObj);
            const data = Object.values(dataObj);

            if(data.length === 0) {
                const fallbackData = { labels: ["Belum Ada Pengeluaran"], datasets: [{ data: [1], backgroundColor: ["#1E293B"]}] };
                myChart = new Chart(ctx, { type: 'doughnut', data: fallbackData, options: {plugins:{legend:{display:false}}, cutout:'70%'} });
                return;
            }

            const colors = ['#EF4444', '#F59E0B', '#10B981', '#3B82F6', '#6366F1', '#EC4899', '#8B5CF6'];

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors.slice(0, labels.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'right', labels: { color: '#F8FAFC', font: { family: "'Plus Jakarta Sans', sans-serif", size: 11 } } },
                        tooltip: { callbacks: { label: function(ctx) { return ' ' + formatRp(ctx.raw); } } }
                    }
                }
            });
        }

        function resetWallet() {
            if(confirm('Semua catatan keuangan ini akan hilang tak bersisa dari browser Anda. Apakah Anda seyakin itu?')) {
                transactions = [];
                localStorage.removeItem('scheapp_pure_finance');
                refreshUI();
            }
        }

        function exportData() {
            if(transactions.length === 0) {
                alert('Belum ada data transaksi untuk diekspor.');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "Backup_ScheApp_Keuangan_" + (new Date().toISOString().slice(0,10)) + ".json");
            dlAnchorElem.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if(Array.isArray(importedData)) {
                        transactions = importedData;
                        localStorage.setItem('scheapp_pure_finance', JSON.stringify(transactions));
                        refreshUI();
                        alert('Data berhasil dipulihkan!');
                    } else {
                        alert('Format file cadangan tidak valid.');
                    }
                } catch(err) {
                    alert('Gagal membaca file tersebut.');
                }
            };
            reader.readAsText(file);
            // Reset the input so the same file could be loaded again
            event.target.value = "";
        }

        refreshUI();
    </script>
</body>
</html>
